<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caio Vinicius</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: Arial, sans-serif; 
      background-color: #000000; 
      color: #fff; 
      margin: 0;
      padding: 20px; 
      overflow-x: hidden; 
      min-height: 100vh;
      position: relative;
    }

    /* Tela de Entrada Ofuscada */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: rgba(13, 17, 23, 0.95);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    /* Efeito de Chuva */
    #rain-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .rain-drop {
      position: absolute;
      background: linear-gradient(to bottom, rgba(88, 166, 255, 0.6), rgba(88, 166, 255, 0.1));
      width: 2px;
      height: 18px;
      animation: fallRain linear forwards;
      border-radius: 2px;
    }
    @keyframes fallRain {
      to { transform: translateY(105vh); }
    }

    /* Efeito Flocos de Neve */
    .snowflake {
      position: fixed;
      top: -10vh;
      color: #fff;
      font-family: Arial, sans-serif;
      text-shadow: 0 0 5px rgba(255,255,255,0.5);
      user-select: none;
      z-index: 2;
      pointer-events: none;
      animation: fallSnow linear forwards;
    }
    @keyframes fallSnow {
      to { transform: translateY(105vh) rotate(360deg); }
    }

    .container { 
      max-width: 850px; 
      margin: 0 auto; 
      background: #090c0f; 
      padding: 25px; 
      border-radius: 12px; 
      border: 1px solid #30363d; 
      position: relative; 
      z-index: 10; 
      box-shadow: 0 8px 30px rgba(0,0,0,0.8);
      animation: floatContainer 6s ease-in-out infinite;
    }
    @keyframes floatContainer {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* Card de Perfil com Zoom Maior */
    .profile-card {
      display: flex; 
      align-items: center; 
      gap: 20px; 
      background: #000000; 
      padding: 20px; 
      border-radius: 8px; 
      margin-bottom: 25px; 
      border: 1px solid #30363d;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    }
    .profile-card:hover {
      transform: scale(1.04);
      border-color: #58a6ff;
      box-shadow: 0 0 30px rgba(88, 166, 255, 0.5);
    }
    .profile-img { 
      width: 80px; 
      height: 80px; 
      border-radius: 50%; 
      object-fit: cover; 
      border: 2px solid #040608; 
      transition: transform 0.6s ease;
    }
    .profile-card:hover .profile-img {
      transform: rotate(360deg) scale(1.1);
    }
    .profile-info {
      flex: 1;
      text-align: left;
    }
    .profile-info h1 { font-size: 22px; margin: 0 0 5px 0; color: #fff; }
    .profile-info p { margin: 0 0 10px 0; color: #8b949e; font-size: 14px; }
    
    /* Links do perfil com Zoom Bem Forte nos ícones */
    .profile-links {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin-top: 8px;
    }
    .profile-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border-radius: 50%;
      background: #0d1117;
      border: 1px solid #30363d;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .profile-links svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
      fill: none;
      transition: all 0.3s ease;
    }
    .profile-links a:hover {
      background: #161b22;
      border-color: #58a6ff;
      transform: scale(1.3);
      box-shadow: 0 0 20px rgba(88, 166, 255, 0.9);
    }
    .profile-links a:hover svg {
      stroke: #58a6ff;
      filter: drop-shadow(0 0 8px rgba(88, 166, 255, 0.9));
    }

    /* Grid de Habilidades */
    .skills-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) {
      .skills-grid { grid-template-columns: 1fr; }
    }

    /* Caixa de Habilidades (Especializações) com Zoom Bem Maior */
    .skill-box {
      background: #000000;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 20px;
      animation: floatBox 3.5s ease-in-out infinite, borderGlow 3.5s ease-in-out infinite;
      position: relative;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    }
    .skill-box:nth-child(2) { animation-delay: 1.2s; }
    .skill-box:nth-child(3) { animation-delay: 0.5s; }

    .skill-box:hover {
      transform: translateY(-8px) scale(1.05);
      border-color: #58a6ff;
      box-shadow: 0 0 30px rgba(88, 166, 255, 0.6);
      z-index: 5;
    }

    @keyframes floatBox {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    @keyframes borderGlow {
      0%, 100% { border-color: #30363d; box-shadow: 0 0 5px rgba(88, 166, 255, 0.1); }
      50% { border-color: #58a6ff; box-shadow: 0 0 20px rgba(88, 166, 255, 0.5); }
    }

    .skill-box h2 {
      font-size: 18px;
      color: #fff;
      margin-top: 0;
      margin-bottom: 15px;
    }

    /* Balões de Habilidades com Zoom Bem Acentuado */
    .skill-item {
      background: #000000;
      color: #fff;
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      position: relative;
      z-index: 2;
    }
    .skill-item img {
      width: 20px !important;
      height: 20px !important;
      min-width: 20px !important;
      max-width: 20px !important;
      object-fit: contain;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }
    .skill-item:hover {
      background: #fff;
      color: #010407;
      transform: translateX(14px) scale(1.07);
      box-shadow: 0 10px 25px rgba(255, 255, 255, 0.5);
    }
    .skill-item:hover img {
      transform: scale(1.4);
    }

    .full-width {
      grid-column: span 2;
    }
    @media (max-width: 768px) {
      .full-width { grid-column: span 1; }
    }

    /* --- ESTILOS DO PLAYER DE MÚSICA COM MOVIMENTO --- */
    #music-player-container {
      position: fixed;
      bottom: -150px;
      right: 20px;
      background: rgba(13, 17, 23, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid #30363d;
      padding: 12px 16px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 999;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      transition: bottom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #music-player-container.show {
      bottom: 20px;
      animation: floatPlayer 4s ease-in-out infinite;
    }
    @keyframes floatPlayer {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    #music-player-container:hover {
      border-color: #58a6ff;
      box-shadow: 0 0 20px rgba(88, 166, 255, 0.4);
    }

    /* CD Giratório */
    .cd-wrapper {
      position: relative;
      width: 50px;
      height: 50px;
      flex-shrink: 0;
    }
    .cd-disc {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, #111 30%, #333 31%, #000 60%, #1a1a1a 61%, #000 100%);
      border: 2px solid #58a6ff;
      box-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cd-disc::after {
      content: '';
      width: 14px;
      height: 14px;
      background: #58a6ff;
      border-radius: 50%;
      border: 2px solid #000;
    }
    .spinning {
      animation: spinCD 3s linear infinite;
    }
    @keyframes spinCD {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Detalhes e Controles do Player */
    .player-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 180px;
    }
    .track-title {
      font-size: 13px;
      font-weight: bold;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 170px;
    }
    .track-artist {
      font-size: 11px;
      color: #8b949e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 170px;
    }
    .player-progress-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .time-display {
      font-size: 10px;
      color: #8b949e;
      min-width: 28px;
    }
    .progress-bar {
      flex: 1;
      height: 4px;
      appearance: none;
      background: #30363d;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .progress-bar::-webkit-slider-thumb {
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #58a6ff;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .progress-bar::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    .player-controls-btns {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 2px;
    }
    .player-btn {
      background: transparent;
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px;
      transition: color 0.2s, transform 0.2s;
    }
    .player-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
    .player-btn:hover {
      color: #58a6ff;
      transform: scale(1.15);
    }
    .play-pause-btn svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>

  <!-- Tela de Entrada Ofuscada -->
  <div id="splash-screen" onclick="entrarNoSite()"></div>

  <!-- Efeito de Chuva -->
  <div id="rain-container"></div>

  <div class="container">
    <!-- Perfil -->
    <div class="profile-card">
      <img src="https://github.com/caiouqz.png" alt="Caio Vinicius" class="profile-img">
      <div class="profile-info">

        <div class="profile-links">

    <div class="skills-grid">
      <!-- Frontend -->
      <div class="skill-box">

        <div class="skill-item">

  <!-- PLAYER DE MÚSICA FLUTUANTE -->
  <div id="music-player-container">
    <div class="cd-wrapper">
      <div id="cd-disc" class="cd-disc"></div>
    </div>
    <div class="player-details">
      <div id="track-title" class="track-title">Nome da Música</div>
      <div id="track-artist" class="track-artist">Cantor / Artista</div>
      
      <div class="player-progress-area">
        <span id="current-time" class="time-display">0:00</span>
        <input type="range" id="progress-bar" class="progress-bar" value="0" min="0" max="100">
        <span id="total-duration" class="time-display">0:00</span>
      </div>

      <div class="player-controls-btns">
        <button class="player-btn" onclick="prevSong()" title="Anterior">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="player-btn play-pause-btn" id="play-pause-btn" onclick="togglePlayPause()" title="Play/Pause">
          <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="player-btn" onclick="nextSong()" title="Próxima">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Elemento de Áudio em Segundo Plano -->
  <audio id="audio-element"></audio>

  <script>
    // --- LISTA DE MÚSICAS (Adicione suas músicas aqui) ---
    const playlist = [
      {
        title: "Conglations - Instrumental",
        artist: "Post Malone",
        src: "musica1.mp3" // Troque pelo link ou caminho do arquivo mp3
      },
      {
        title: "Set dos casados Speed up + grave",
        artist: " MC Kevin, Davi, Hariel, Don Juan",
        src: "musica2.mp3" // Troque pelo link ou caminho do arquivo mp3
      },
      {
        title: "Noite Perfeita",
        artist: "Brandão",
        src: "musica3.mp3" // Troque pelo link ou caminho do arquivo mp3
      },
       {
        title: "Kenny G",
        artist: "Matue",
        src: "musica4.mp3" // Troque pelo link ou caminho do arquivo mp3
      },
      {
        title: "Kenny G",
        artist: "Matue",
        src: "musica5.mp3" // Troque pelo link ou caminho do arquivo mp3
      },
      {
        title: "Noite Perfeita",
        artist: "Brandão",
        src: "musica6.mp3" // Troque pelo link ou caminho do arquivo mp3
      },
      {
        title: "Noite Perfeita",
        artist: "Brandão",
        src: "musica7.mp3" // Troque pelo link ou caminho do arquivo mp3
      },
    ];

    let currentTrackIndex = 0;
    const audioElement = document.getElementById('audio-element');
    const cdDisc = document.getElementById('cd-disc');
    const trackTitle = document.getElementById('track-title');
    const trackArtist = document.getElementById('track-artist');
    const progressBar = document.getElementById('progress-bar');
    const currentTimeEl = document.getElementById('current-time');
    const totalDurationEl = document.getElementById('total-duration');
    const playPauseBtn = document.getElementById('play-pause-btn');

    function loadTrack(index) {
      const track = playlist[index];
      trackTitle.textContent = track.title;
      trackArtist.textContent = track.artist;
      audioElement.src = track.src;
      audioElement.load();
    }

    function entrarNoSite() {
      const splash = document.getElementById('splash-screen');
      const playerContainer = document.getElementById('music-player-container');
      
      playerContainer.classList.add('show');

      loadTrack(currentTrackIndex);
      audioElement.play().then(() => {
        cdDisc.classList.add('spinning');
        updatePlayPauseIcon(true);
      }).catch(e => console.log("Áudio bloqueado ou arquivo não encontrado:", e));

      splash.style.opacity = '0';
      setTimeout(() => {
        splash.style.display = 'none';
      }, 800);
    }

    function togglePlayPause() {
      if (audioElement.paused) {
        audioElement.play();
        cdDisc.classList.add('spinning');
        updatePlayPauseIcon(true);
      } else {
        audioElement.pause();
        cdDisc.classList.remove('spinning');
        updatePlayPauseIcon(false);
      }
    }

    function updatePlayPauseIcon(isPlaying) {
      const playPauseIconSvg = playPauseBtn.querySelector('svg');
      if (isPlaying) {
        playPauseIconSvg.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      } else {
        playPauseIconSvg.innerHTML = '<path d="M8 5v14l11-7z"/>';
      }
    }

    function nextSong() {
      currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
      loadTrack(currentTrackIndex);
      audioElement.play();
      cdDisc.classList.add('spinning');
      updatePlayPauseIcon(true);
    }

    function prevSong() {
      currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
      loadTrack(currentTrackIndex);
      audioElement.play();
      cdDisc.classList.add('spinning');
      updatePlayPauseIcon(true);
    }

    audioElement.addEventListener('timeupdate', () => {
      if (audioElement.duration) {
        const progressPercent = (audioElement.currentTime / audioElement.duration) * 100;
        progressBar.value = progressPercent;
        currentTimeEl.textContent = formatTime(audioElement.currentTime);
        totalDurationEl.textContent = formatTime(audioElement.duration);
      }
    });

    progressBar.addEventListener('input', () => {
      if (audioElement.duration) {
        const seekTime = (progressBar.value / 100) * audioElement.duration;
        audioElement.currentTime = seekTime;
      }
    });

    audioElement.addEventListener('ended', () => {
      nextSong();
    });

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    loadTrack(0);

    function createRainDrop() {
      const container = document.getElementById('rain-container');
      const drop = document.createElement('div');
      drop.classList.add('rain-drop');
      drop.style.left = Math.random() * 100 + 'vw';
      drop.style.top = '-20px';
      drop.style.animationDuration = (Math.random() * 0.8 + 0.4) + 's';
      drop.style.opacity = Math.random() * 0.6 + 0.2;
      
      container.appendChild(drop);
      
      setTimeout(() => {
        drop.remove();
      }, 1500);
    }
    setInterval(createRainDrop, 35);

    function createSnowflake() {
      const snowflake = document.createElement('div');
      snowflake.classList.add('snowflake');
      snowflake.textContent = '❅';
      snowflake.style.left = Math.random() * 100 + 'vw';
      snowflake.style.animationDuration = (Math.random() * 3 + 3) + 's';
      snowflake.style.opacity = Math.random() * 0.5 + 0.3;
      snowflake.style.fontSize = (Math.random() * 8 + 8) + 'px';
      
      document.body.appendChild(snowflake);
      
      setTimeout(() => {
        snowflake.remove();
      }, 6000);
    }
    setInterval(createSnowflake, 150);
  </script>
</body>
</html>
