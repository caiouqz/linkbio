<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caio Vinicius - Portfólio</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: Arial, sans-serif; 
      background-color: #000000; 
      color: #fff; 
      margin: 0;
      padding: 20px; 
      overflow-x: hidden; 
      min-height: 100vh;
      position: relative;
    }

    /* Tela de Entrada Ofuscada */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: rgba(13, 17, 23, 0.95);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #splash-screen h1 {
      font-size: 5rem;
      color: #58a6ff;
      margin: 0;
      text-shadow: 0 0 20px rgba(88, 166, 255, 0.6);
      animation: pulseName 2s ease-in-out infinite;
    }
    #splash-screen p {
      color: #8b949e;
      font-size: 1.1rem;
      margin-top: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    @keyframes pulseName {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; text-shadow: 0 0 30px rgba(88, 166, 255, 0.9); }
    }

    /* Efeito de Chuva */
    #rain-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .rain-drop {
      position: absolute;
      background: linear-gradient(to bottom, rgba(88, 166, 255, 0.6), rgba(88, 166, 255, 0.1));
      width: 2px;
      height: 18px;
      animation: fallRain linear forwards;
      border-radius: 2px;
    }
    @keyframes fallRain {
      to { transform: translateY(105vh); }
    }

    /* Efeito Flocos de Neve */
    .snowflake {
      position: fixed;
      top: -10vh;
      color: #fff;
      font-family: Arial, sans-serif;
      text-shadow: 0 0 5px rgba(255,255,255,0.5);
      user-select: none;
      z-index: 2;
      pointer-events: none;
      animation: fallSnow linear forwards;
    }
    @keyframes fallSnow {
      to { transform: translateY(105vh) rotate(360deg); }
    }

    .container { 
      max-width: 850px; 
      margin: 0 auto; 
      background: #090c0f; 
      padding: 25px; 
      border-radius: 12px; 
      border: 1px solid #30363d; 
      position: relative; 
      z-index: 10; 
      box-shadow: 0 8px 30px rgba(0,0,0,0.8);
      animation: floatContainer 6s ease-in-out infinite;
    }
    @keyframes floatContainer {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* Card de Perfil */
    .profile-card {
      display: flex; 
      align-items: center; 
      gap: 20px; 
      background: #000000; 
      padding: 20px; 
      border-radius: 8px; 
      margin-bottom: 25px; 
      border: 1px solid #30363d;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    }
    .profile-card:hover {
      transform: scale(1.02);
      border-color: #050505;
      box-shadow: 0 0 25px rgba(88, 166, 255, 0.35);
    }
    .profile-img { 
      width: 80px; 
      height: 80px; 
      border-radius: 50%; 
      object-fit: cover; 
      border: 2px solid #040608; 
      transition: transform 0.6s ease;
    }
    .profile-card:hover .profile-img {
      transform: rotate(360deg);
    }
    .profile-info {
      flex: 1;
      text-align: left;
    }
    .profile-info h1 { font-size: 22px; margin: 0 0 5px 0; color: #fff; }
    .profile-info p { margin: 0 0 10px 0; color: #8b949e; font-size: 14px; }
    
    /* Links do perfil (Instagram e GitHub) */
    .profile-links {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin-top: 8px;
    }
    .profile-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border-radius: 50%;
      background: #0d1117;
      border: 1px solid #30363d;
      transition: all 0.3s ease;
    }
    .profile-links svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
      fill: none;
      transition: all 0.3s ease;
    }
    .profile-links a:hover {
      background: #161b22;
      border-color: #58a6ff;
      transform: scale(1.15);
      box-shadow: 0 0 15px rgba(88, 166, 255, 0.8);
    }
    .profile-links a:hover svg {
      stroke: #58a6ff;
      filter: drop-shadow(0 0 6px rgba(88, 166, 255, 0.9));
    }

    /* Grid de Habilidades */
    .skills-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) {
      .skills-grid { grid-template-columns: 1fr; }
    }

    /* Caixa de Habilidades com flutuação e borda animada mais intensa */
    .skill-box {
      background: #000000;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 20px;
      animation: floatBox 3.5s ease-in-out infinite, borderGlow 3.5s ease-in-out infinite;
      position: relative;
    }
    .skill-box:nth-child(2) { animation-delay: 1.2s; }
    .skill-box:nth-child(3) { animation-delay: 0.5s; }

    @keyframes floatBox {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    @keyframes borderGlow {
      0%, 100% { border-color: #30363d; box-shadow: 0 0 5px rgba(88, 166, 255, 0.1); }
      50% { border-color: #58a6ff; box-shadow: 0 0 20px rgba(88, 166, 255, 0.5); }
    }

    .skill-box h2 {
      font-size: 18px;
      color: #fff;
      margin-top: 0;
      margin-bottom: 15px;
    }

    /* Balões de Habilidades */
    .skill-item {
      background: #000000;
      color: #fff;
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      position: relative;
      z-index: 2;
    }
    .skill-item img {
      width: 20px !important;
      height: 20px !important;
      min-width: 20px !important;
      max-width: 20px !important;
      object-fit: contain;
      flex-shrink: 0;
    }
    .skill-item:hover {
      background: #fff;
      color: #1f6feb;
      transform: translateX(12px) scale(1.05);
      box-shadow: 0 8px 20px rgba(255, 255, 255, 0.4);
    }

    .full-width {
      grid-column: span 2;
    }
    @media (max-width: 768px) {
      .full-width { grid-column: span 1; }
    }
  </style>
</head>
<body>

  <!-- Tela de Entrada (Splash Screen) -->
  <div id="splash-screen" onclick="entrarNoSite()">
    <h1>Caio</h1>
    <p>Clique em qualquer lugar para entrar</p>
  </div>

  <!-- Elemento de Áudio da Música de Fundo -->
  <audio id="bg-music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-tenderness.mp3" type="audio/mp3">
  </audio>

  <!-- Elemento de Chuva -->
  <div id="rain-container"></div>

  <div class="container">
    <!-- Perfil -->
    <div class="profile-card">
      <img src="https://github.com/caiouqz.png" alt="Caio Vinicius" class="profile-img">
      <div class="profile-info">
        <h1>Caio Vinicius</h1>
        <p>Full Stack Dev</p>
        <div class="profile-links">
          <!-- Instagram -->
          <a href="https://www.instagram.com/caioopj/" target="_blank" title="Instagram">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
          </a>
          <!-- GitHub -->
          <a href="https://github.com/caiouqz" target="_blank" title="GitHub">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
              <path d="M9 18c-4.51 2-5-2-7-2"></path>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <!-- Grid de Habilidades -->
    <div class="skills-grid">
      <!-- Frontend -->
      <div class="skill-box">
        <h2>Frontend</h2>
        <div class="skill-item">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nextjs/nextjs-original.svg" alt="Next.js"> Next.js
        </div>
        <div class="skill-item">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/tailwindcss/tailwindcss-original.svg" alt="Tailwind CSS"> Tailwind CSS
        </div>
        <div class="skill-item">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/bootstrap/bootstrap-original.svg" alt="Bootstrap"> bootstrap
        </div>
        <div class="skill-item">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" alt="HTML"> Html
        </div>
        <div class="skill-item">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/typescript/typescript-original.svg" alt="TypeScript"> typescript
        </div>
        <div class="skill-item" style="margin-bottom: 0;">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg" alt="React Native"> React Native
        </div>
      </div>

      <!-- Backend -->
      <div class="skill-box">
        <h2>Backend</h2>
        <div class="skill-item">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/laravel/laravel-original.svg" alt="Laravel"> Laravel
        </div>
        <div class="skill-item">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nodejs/nodejs-original.svg" alt="Node.js"> Node.js
        </div>
        <div class="skill-item">
          <img src="https://api.iconify.design/fluent:payment-24-regular.svg?color=%23ffffff" alt="Gateway"> Integração de Gateway
        </div>
        <div class="skill-item">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mysql/mysql-original.svg" alt="MySQL"> mySQL
        </div>
        <div class="skill-item">
          <img src="https://api.iconify.design/carbon:api.svg?color=%23ffffff" alt="APIs REST"> APIs REST
        </div>
        <div class="skill-item" style="margin-bottom: 0;">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/php/php-original.svg" alt="PHP"> PHP
        </div>
      </div>

      <!-- Ferramentas -->
      <div class="skill-box full-width">
        <h2>Ferramentas</h2>
        <div class="skills-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 0;">
          <div class="skill-item" style="margin-bottom:0;">
            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg" alt="VS Code"> Visual Code
          </div>
          <div class="skill-item" style="margin-bottom:0;">
            <img src="https://www.google.com/s2/favicons?domain=hostinger.com&sz=128" alt="Hostinger"> Hostinger
          </div>
          <div class="skill-item" style="margin-top:0; margin-bottom:0;">
            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/postgresql/postgresql-original.svg" alt="PostgreSQL"> PostgreSQl
          </div>
          <div class="skill-item" style="margin-top:0; margin-bottom:0;">
            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/phpmyadmin/phpmyadmin-original.svg" alt="phpMyAdmin"> PHPmyadmin
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function entrarNoSite() {
      const splash = document.getElementById('splash-screen');
      const music = document.getElementById('bg-music');
      
      music.play().catch(e => console.log("Áudio bloqueado:", e));

      splash.style.opacity = '0';
      setTimeout(() => {
        splash.style.display = 'none';
      }, 800);
    }

    function createRainDrop() {
      const container = document.getElementById('rain-container');
      const drop = document.createElement('div');
      drop.classList.add('rain-drop');
      drop.style.left = Math.random() * 100 + 'vw';
      drop.style.top = '-20px';
      drop.style.animationDuration = (Math.random() * 0.8 + 0.4) + 's';
      drop.style.opacity = Math.random() * 0.6 + 0.2;
      
      container.appendChild(drop);
      
      setTimeout(() => {
        drop.remove();
      }, 1500);
    }
    setInterval(createRainDrop, 35);

    function createSnowflake() {
      const snowflake = document.createElement('div');
      snowflake.classList.add('snowflake');
      snowflake.textContent = '❅';
      snowflake.style.left = Math.random() * 100 + 'vw';
      snowflake.style.animationDuration = (Math.random() * 3 + 3) + 's';
      snowflake.style.opacity = Math.random() * 0.5 + 0.3;
      snowflake.style.fontSize = (Math.random() * 8 + 8) + 'px';
      
      document.body.appendChild(snowflake);
      
      setTimeout(() => {
        snowflake.remove();
      }, 6000);
    }
    setInterval(createSnowflake, 150);
  </script>
</body>
</html>
